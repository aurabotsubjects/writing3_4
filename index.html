<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Writing Warm-Up — Years 3–4 — Term 1</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap");
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b14;--bg-card:#13101e;--bg-surface:#1a1628;--border:rgba(255,255,255,.08);--border-hi:rgba(255,255,255,.18);--text:#f0eeff;--text-muted:rgba(240,238,255,.55);--text-dim:rgba(240,238,255,.3);--mon:#e63946;--tue:#f4a261;--wed:#2ec4b6;--thu:#a855f7;--fri:#facc15;--i-do:#3b82f6;--we-do:#10b981;--you-do:#f97316;--focus:#fb923c;--tui:#6366f1;--kiwi:#ef4444;--font-display:"Bebas Neue","Impact",sans-serif;--font-body:"Space Grotesk","DM Sans",system-ui,sans-serif;--r-sm:4px;--r-md:8px;--r-lg:12px}
html{font-size:18px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;background-image:radial-gradient(ellipse 70% 55% at 30% 20%,rgba(139,92,246,.12) 0%,transparent 70%)}
.focus-word{color:var(--focus);font-weight:700}
.site-header{background:#0d0b14eb;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.site-header:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--mon) 0 20%,var(--tue) 20% 40%,var(--wed) 40% 60%,var(--thu) 60% 80%,var(--fri) 80% 100%)}
.wordmark{font-family:var(--font-display);font-size:1.8rem;letter-spacing:.04em}
.wordmark span{color:var(--thu)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.week-selector{display:flex;align-items:center;gap:.4rem;background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--r-sm);padding:.3rem .5rem}
.week-selector__label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:0 .3rem}
.week-btn{font-family:var(--font-body);font-size:.7rem;font-weight:700;letter-spacing:.06em;background:transparent;border:1px solid transparent;color:var(--text-muted);padding:.3rem .65rem;border-radius:3px;cursor:pointer;transition:.12s}
.week-btn:hover{color:var(--text);background:var(--bg-card)}
.week-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.day-tabs{display:flex;gap:.5rem;padding:1rem 2rem;background:var(--bg-card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.day-tab{font-family:var(--font-body);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.6rem 1.1rem;border-radius:var(--r-sm);border:1px solid var(--border-hi);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s}
.day-tab .dot{width:8px;height:8px;border-radius:50%}
.day-tab:hover{background:var(--bg-surface);color:var(--text)}
.day-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.main{max-width:880px;margin:0 auto;padding:2.5rem 2rem}
.lesson-header{margin-bottom:1.25rem}
.lesson-header__meta{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.lesson-header__badge{display:inline-flex;padding:.18rem .65rem;border-radius:3px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bg)}
.lesson-header__topic{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:400;line-height:.98;letter-spacing:.02em;margin-bottom:.6rem}
.values-tag{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .7rem;border-radius:10px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.35);color:#c084fc}
.btn{font-family:var(--font-body);font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.65rem 1.2rem;border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--border-hi);background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{background:var(--bg-surface);border-color:var(--text-muted)}
.btn--plan{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn--plan:hover{background:#a855f7;border-color:#a855f7;color:#fff;box-shadow:0 4px 16px rgba(168,85,247,.35)}
.btn--curriculum{border-color:rgba(251,146,60,.45);color:var(--focus)}
.btn--curriculum:hover{background:rgba(251,146,60,.1);border-color:var(--focus)}
.btn--curriculum.active{background:var(--focus);color:var(--bg);border-color:var(--focus)}
.action-row{display:flex;gap:.65rem;flex-wrap:wrap;margin-bottom:1.25rem}
.curriculum-panel{display:none;background:var(--bg-card);border:1px solid rgba(251,146,60,.3);border-radius:var(--r-lg);padding:1.1rem 1.3rem;margin-bottom:1.25rem}
.curriculum-panel.open{display:block}
.curriculum-panel__intro{font-size:.78rem;color:var(--text-muted);margin-bottom:.85rem}
.ao-tags{display:flex;flex-wrap:wrap;gap:6px}
.ao-tag{display:inline-flex;align-items:center;gap:5px;padding:.32rem .8rem;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--focus);color:var(--focus);cursor:pointer;background:transparent;font-family:var(--font-body);transition:.15s}
.ao-tag:hover{background:rgba(251,146,60,.12)}
.ao-tag.open{background:var(--focus);color:var(--bg)}
.ao-detail{display:none;background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--r-sm);padding:.8rem 1rem;margin-top:.6rem;font-size:.85rem;line-height:1.6;color:var(--text-muted)}
.ao-detail.open{display:block}
.ao-detail strong{color:var(--text)}
.curriculum-panel__record{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border);font-size:.74rem;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.stage-progress{display:flex;gap:.5rem;margin-bottom:1.5rem}
.stage-progress__step{flex:1;display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg-card);opacity:.45}
.stage-progress__step.active{opacity:1;border-color:currentColor;background:var(--bg-surface)}
.stage-progress__step.done{opacity:.8}
.stage-progress__icon{font-size:1rem}
.stage-progress__label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.stage-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1.25rem;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.stage-card__header{padding:1.1rem 1.4rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border)}
.stage-card__header h2{font-family:var(--font-display);font-size:1.4rem;font-weight:400;letter-spacing:.04em}
.stage-card__body{padding:1.4rem}
.instruction-block{font-size:1.05rem;margin-bottom:1rem;line-height:1.65}
.clickable-box{cursor:zoom-in;position:relative}
.clickable-box:after{content:"\u29c2 tap to enlarge";position:absolute;bottom:6px;right:10px;font-size:.6rem;color:var(--text-dim);opacity:0;transition:.15s}
.clickable-box:hover:after{opacity:1}
.clickable-box:hover{outline:1px solid var(--border-hi)}
.example-box{background:var(--bg-surface);border-left:3px solid currentColor;border-radius:0 var(--r-sm) var(--r-sm) 0;padding:.85rem 1.1rem;margin-bottom:1rem;font-size:1.15rem;line-height:1.6}
.example-box__label{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.4rem;color:var(--text-muted)}
.demo-box{background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--r-md);padding:.85rem 1.1rem;margin-bottom:1rem;font-size:1rem;color:var(--text-muted)}
.demo-box__label{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.4rem;color:var(--text-dim)}
.tip-box{display:flex;gap:.75rem;align-items:flex-start;background:#facc1512;border:1px solid rgba(250,204,21,.25);border-radius:var(--r-md);padding:.85rem 1.1rem;font-size:.92rem;line-height:1.5}
.sentence-list,.task-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.sentence-list li,.task-list li{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.6rem 1rem;font-size:1.1rem;line-height:1.5;display:flex;gap:.7rem;align-items:flex-start;cursor:zoom-in}
.sentence-list li:hover,.task-list li:hover{border-color:var(--border-hi)}
.sentence-list li:before{content:"\u2192";color:var(--text-dim);flex-shrink:0}
.task-list li.bonus{border-style:dashed;border-color:var(--fri);background:#facc150d}
.prompt-line{font-size:.88rem;color:var(--text-muted);font-style:italic;margin-top:.25rem}
.stage-nav{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:2rem}
.stage-nav__btn{padding:.6rem 1.6rem;border-radius:var(--r-sm);border:none;font-family:var(--font-body);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px}
.stage-nav__btn--prev{background:transparent;color:var(--text-muted);border:1px solid var(--border-hi)}
.stage-nav__btn--prev:hover{color:var(--text)}
.stage-nav__btn--next{background:var(--text);color:var(--bg)}
.stage-nav__btn--next:hover{box-shadow:0 4px 20px rgba(240,238,255,.25)}
.stage-nav__btn--quiz{background:var(--fri);color:var(--bg)}
.stage-nav__btn--quiz:hover{box-shadow:0 4px 20px rgba(250,204,21,.4)}
.stage-nav__btn:disabled{opacity:.3;cursor:not-allowed}
.complete-screen{text-align:center;padding:3.5rem 1.5rem}
.complete-screen__icon{font-size:3.2rem;margin-bottom:.75rem;display:block}
.complete-screen__heading{font-family:var(--font-display);font-size:3rem;font-weight:400;letter-spacing:.04em;margin-bottom:.75rem}
.complete-screen__sub{font-size:1.05rem;color:var(--text-muted);max-width:420px;margin:0 auto 1.75rem}
.complete-screen__actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.quiz-setup{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem;text-align:center}
.quiz-setup h2{font-family:var(--font-display);font-size:2.4rem;letter-spacing:.04em;margin-bottom:.5rem}
.quiz-setup p{color:var(--text-muted);margin-bottom:2rem}
.team-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.team-card{border-radius:var(--r-lg);padding:1.5rem 1rem;text-align:center;border:2px solid}
.team-card--tui{border-color:var(--tui);background:rgba(99,102,241,.1)}
.team-card--kiwi{border-color:var(--kiwi);background:rgba(239,68,68,.1)}
.team-card__bird{font-size:2.8rem;margin-bottom:.3rem}
.team-card__name{font-family:var(--font-display);font-size:1.8rem;letter-spacing:.04em}
.team-card--tui .team-card__name{color:var(--tui)}
.team-card--kiwi .team-card__name{color:var(--kiwi)}
.team-card__sub{font-size:.72rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.quiz-arena{display:flex;flex-direction:column;gap:1.25rem}
.score-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:.9rem 1.2rem}
.score-team{display:flex;align-items:center;gap:.6rem}
.score-team--kiwi{flex-direction:row-reverse;text-align:right}
.score-team__name{font-family:var(--font-display);font-size:1.3rem;letter-spacing:.04em}
.score-team--tui .score-team__name{color:var(--tui)}
.score-team--kiwi .score-team__name{color:var(--kiwi)}
.score-team__pts{font-family:var(--font-display);font-size:2.2rem;line-height:1}
.score-divider{font-family:var(--font-display);font-size:1.2rem;color:var(--text-dim);text-align:center}
.q-progress{text-align:center;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.q-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.q-card__whose{padding:.55rem 1.2rem;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.q-card__whose--tui{background:rgba(99,102,241,.15);color:var(--tui);border-bottom:1px solid rgba(99,102,241,.2)}
.q-card__whose--kiwi{background:rgba(239,68,68,.15);color:var(--kiwi);border-bottom:1px solid rgba(239,68,68,.2)}
.q-card__body{padding:1.4rem}
.q-card__q{font-size:1.2rem;font-weight:600;line-height:1.5;margin-bottom:1.25rem}
.q-card__options{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.1rem}
.q-opt{font-family:var(--font-body);background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:var(--r-sm);padding:.75rem 1.1rem;text-align:left;font-size:.95rem;cursor:pointer;color:var(--text);transition:.15s;width:100%}
.q-opt:hover{background:var(--bg-card);border-color:var(--text-muted)}
.q-opt.correct{background:#10b98122;border-color:var(--we-do);color:#6ee7b7}
.q-opt.wrong{background:#e6394622;border-color:var(--mon);color:#fca5a5}
.q-opt.reveal-correct{background:#10b98122;border-color:var(--we-do);color:#6ee7b7}
.q-opt:disabled{cursor:default}
.q-card__feedback{padding:.75rem 1rem;border-radius:var(--r-sm);font-size:.92rem;margin-bottom:1rem;display:none;line-height:1.55}
.q-card__feedback.show{display:block}
.q-card__feedback.correct{background:#10b98115;border:1px solid var(--we-do);color:#6ee7b7}
.q-card__feedback.wrong{background:#e6394615;border:1px solid var(--mon);color:#fca5a5}
.q-card__next{display:none}
.q-card__next.show{display:flex;justify-content:flex-end}
.quiz-final{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:2.5rem 1.5rem;text-align:center}
.quiz-final__trophy{font-size:4rem;margin-bottom:.5rem}
.quiz-final__heading{font-family:var(--font-display);font-size:2.8rem;letter-spacing:.04em;margin-bottom:.4rem}
.quiz-final__winner{font-size:1.1rem;color:var(--text-muted);margin-bottom:1.5rem}
.quiz-final__scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:400px;margin:0 auto 2rem}
.quiz-final__team{border-radius:var(--r-md);padding:1.1rem;border:2px solid}
.quiz-final__team--tui{border-color:var(--tui);background:rgba(99,102,241,.1)}
.quiz-final__team--kiwi{border-color:var(--kiwi);background:rgba(239,68,68,.1)}
.quiz-final__team-name{font-family:var(--font-display);font-size:1.5rem;letter-spacing:.04em;margin-bottom:.15rem}
.quiz-final__team--tui .quiz-final__team-name{color:var(--tui)}
.quiz-final__team--kiwi .quiz-final__team-name{color:var(--kiwi)}
.quiz-final__team-pts{font-size:2.5rem;font-family:var(--font-display)}
.modal-overlay{position:fixed;inset:0;background:rgba(8,6,14,.78);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:3vh 1.25rem;z-index:1000;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:var(--r-lg);max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6);margin-bottom:3vh}
.modal__header{position:sticky;top:0;background:var(--bg-card);border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:2}
.modal__eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.3rem}
.modal__title{font-family:var(--font-display);font-size:1.8rem;font-weight:400;letter-spacing:.02em;line-height:1.05}
.modal__close{background:var(--bg-surface);border:1px solid var(--border-hi);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;flex-shrink:0}
.modal__close:hover{background:var(--mon);border-color:var(--mon);color:#fff}
.modal__body{padding:1.5rem}
.plan-section{margin-bottom:1.5rem}
.plan-section:last-child{margin-bottom:0}
.plan-section__title{font-size:.66rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#a855f7;margin-bottom:.65rem;display:flex;align-items:center;gap:7px}
.plan-section__title:before{content:"";width:14px;height:2px;background:#a855f7}
.context-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem}
.context-item{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.6rem .8rem}
.context-item__label{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.context-item__value{font-size:.84rem}
.plan-list{list-style:none;display:flex;flex-direction:column;gap:.4rem}
.plan-list li{font-size:.86rem;color:var(--text-muted);padding-left:1.1rem;position:relative;line-height:1.5}
.plan-list li:before{content:"\u2192";position:absolute;left:0;color:var(--text-dim)}
.timing-table{width:100%;border-collapse:collapse;font-size:.82rem}
.timing-table th{text-align:left;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:.5rem;border-bottom:1px solid var(--border-hi)}
.timing-table td{padding:.65rem .5rem;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text-muted)}
.timing-table tr:last-child td{border-bottom:none}
.time-col{white-space:nowrap;font-weight:700;color:var(--text);font-size:.76rem}
.activity-col{color:var(--text);font-weight:600;font-size:.83rem}
.phase-badge{display:inline-block;font-size:.56rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.14rem .5rem;border-radius:10px;margin-top:.25rem;color:#fff}
.phase-i-do{background:var(--i-do)}.phase-we-do{background:var(--we-do)}.phase-you-do{background:var(--you-do)}.phase-reflect{background:#a855f7}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
@media(max-width:560px){.diff-grid{grid-template-columns:1fr}.team-row{grid-template-columns:1fr}}
.diff-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.7rem .85rem}
.diff-card__label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--you-do);margin-bottom:.25rem}
.diff-card p{font-size:.8rem;color:var(--text-muted);line-height:1.45}
.values-box{background:#a855f712;border:1px solid rgba(168,85,247,.3);border-radius:var(--r-md);padding:1rem 1.2rem}
.values-box p{font-size:.84rem;color:var(--text-muted);margin-bottom:.5rem;line-height:1.55}
.modal__footer{padding:1rem 1.5rem 1.5rem;display:flex;justify-content:flex-end}
.fs-overlay{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:1100;padding:3rem 2rem;cursor:zoom-out}
.fs-overlay.open{display:flex}
.fs-overlay__text{font-size:clamp(1.8rem,5vw,3.2rem);line-height:1.5;text-align:center;max-width:1000px}
.fs-overlay__hint{position:absolute;bottom:2rem;left:0;right:0;text-align:center;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
</style>
</head>
<body>
<header class="site-header">
  <div class="wordmark">Writing Warm-Up <span>3&#8211;4</span></div>
  <div class="header-right">
    <div class="week-selector">
      <span class="week-selector__label">Term</span>
      <button class="week-btn term-btn active" onclick="switchTerm(1)">1</button>
      <button class="week-btn term-btn" onclick="switchTerm(2)">2</button>
      <button class="week-btn term-btn" onclick="switchTerm(3)">3</button>
      <button class="week-btn term-btn" onclick="switchTerm(4)">4</button>
    </div>
    <div class="week-selector" id="weekSel"></div>
  </div>
</header>
<nav class="day-tabs" id="dayTabs"></nav>
<main class="main" id="main"></main>
<div class="modal-overlay" id="planModal">
  <div class="modal">
    <div class="modal__header">
      <div><div class="modal__eyebrow" id="modalEyebrow"></div><div class="modal__title" id="modalTitle"></div></div>
      <button class="modal__close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal__body" id="modalBody"></div>
    <div class="modal__footer"><button class="btn" onclick="closeModal()">Close</button></div>
  </div>
</div>
